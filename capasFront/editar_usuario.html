<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Editar Usuario</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #eef4ff 0%, #f8fbff 50%, #ffffff 100%);
      min-height: 100vh;
    }

    .navbar {
      background: linear-gradient(90deg, #0d6efd, #3d8bfd);
      box-shadow: 0 10px 25px rgba(13, 110, 253, 0.18);
    }

    .navbar-brand {
      font-weight: 800;
    }

    .main-card {
      border: none;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 20px 45px rgba(31, 45, 61, 0.12);
      background: #fff;
    }

    .card-header-custom {
      background: linear-gradient(135deg, #ffc107, #ffda6a);
      color: #1f2d3d;
      padding: 2rem;
      text-align: center;
    }

    .card-header-custom h2 {
      margin: 0;
      font-weight: 800;
    }

    .card-header-custom p {
      margin-top: 0.6rem;
      margin-bottom: 0;
      opacity: 0.9;
    }

    .card-body-custom {
      padding: 2rem;
    }

    .form-label {
      font-weight: 600;
      color: #344054;
    }

    .form-control {
      border-radius: 14px;
      padding: 0.9rem 1rem;
      border: 1px solid #dbe3ef;
    }

    .form-control:focus {
      box-shadow: 0 0 0 0.2rem rgba(255, 193, 7, 0.18);
      border-color: #ffd24d;
    }

    .btn-custom {
      border-radius: 14px;
      padding: 0.85rem 1.2rem;
      font-weight: 600;
    }

    .helper-text {
      color: #667085;
      font-size: 0.95rem;
      margin-bottom: 1.5rem;
      text-align: center;
    }

    .form-section {
      border: 1px solid #e9eef5;
      border-radius: 18px;
      padding: 1.5rem;
      background: #fbfdff;
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
      <a class="navbar-brand" href="index_usuario.html">👥 Gestión de Usuarios</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse mt-2 mt-lg-0" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="ver_usuarios.html">Ver usuarios</a></li>
          <li class="nav-item"><a class="nav-link" href="insertar_usuario.html">Insertar</a></li>
          <li class="nav-item"><a class="nav-link" href="consultar_usuario.html">Consultar</a></li>
          <li class="nav-item"><a class="nav-link active" href="editar_usuario.html">Editar</a></li>
          <li class="nav-item"><a class="nav-link" href="borrar_usuario.html">Eliminar</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container py-5">
    <div class="main-card mx-auto" style="max-width: 900px;">
      <div class="card-header-custom">
        <h2>Editar Usuario</h2>
        <p>Busca un usuario por su ID y actualiza sus datos.</p>
      </div>

      <div class="card-body-custom">
        <p class="helper-text">
          Primero consulta el usuario con su ID. Luego modifica los campos y guarda los cambios.
        </p>

        <div class="form-section mb-4">
          <form id="buscar-form">
            <label for="id-buscar" class="form-label">Ingrese el ID del usuario a editar</label>
            <input type="number" id="id-buscar" class="form-control mb-3" placeholder="Ej: 1" required>

            <div class="d-flex flex-wrap gap-3">
              <button type="submit" class="btn btn-warning btn-custom">Buscar usuario</button>
              <a href="index_usuario.html" class="btn btn-secondary btn-custom">Volver al inicio</a>
            </div>
          </form>
        </div>

        <form id="editar-form" class="d-none">
          <div class="form-section">
            <div class="row g-4">
              <div class="col-md-6">
                <label for="nombres" class="form-label">Nombres</label>
                <input type="text" id="nombres" class="form-control" required>
              </div>

              <div class="col-md-6">
                <label for="apellidos" class="form-label">Apellidos</label>
                <input type="text" id="apellidos" class="form-control" required>
              </div>

              <div class="col-md-6">
                <label for="cedula" class="form-label">Cédula</label>
                <input type="text" id="cedula" class="form-control" required>
              </div>

              <div class="col-md-6">
                <label for="correo" class="form-label">Correo</label>
                <input type="email" id="correo" class="form-control" required>
              </div>

              <div class="col-md-6">
                <label for="telefono" class="form-label">Teléfono</label>
                <input type="text" id="telefono" class="form-control" required>
              </div>

              <div class="col-md-6">
                <label for="direccion" class="form-label">Dirección</label>
                <input type="text" id="direccion" class="form-control" required>
              </div>
            </div>

            <div class="d-flex flex-wrap gap-3 mt-4">
              <button type="submit" class="btn btn-success btn-custom">Guardar cambios</button>
              <a href="index_usuario.html" class="btn btn-secondary btn-custom">Volver</a>
            </div>
          </div>
        </form>

        <div id="mensaje" class="alert mt-4 d-none"></div>
      </div>
    </div>
  </div>

  <script>
    var usuarioId = null;

    document.getElementById('buscar-form').addEventListener('submit', function (e) {
      e.preventDefault();

      var id = document.getElementById('id-buscar').value;

      fetch('http://192.168.100.2:3001/api/usuarios/' + id)
        .then(function (res) {
          if (!res.ok) {
            throw new Error('Usuario no encontrado');
          }
          return res.json();
        })
        .then(function (data) {
          usuarioId = data.id;
          document.getElementById('nombres').value = data.nombres;
          document.getElementById('apellidos').value = data.apellidos;
          document.getElementById('cedula').value = data.cedula;
          document.getElementById('correo').value = data.correo;
          document.getElementById('telefono').value = data.telefono;
          document.getElementById('direccion').value = data.direccion;
          

          document.getElementById('editar-form').classList.remove('d-none');

          var mensaje = document.getElementById('mensaje');
          mensaje.classList.add('d-none');
        })
        .catch(function () {
          var mensaje = document.getElementById('mensaje');
          mensaje.classList.remove('d-none', 'alert-success');
          mensaje.classList.add('alert', 'alert-danger');
          mensaje.textContent = 'Usuario no encontrado';
          document.getElementById('editar-form').classList.add('d-none');
        });
    });

    document.getElementById('editar-form').addEventListener('submit', function (e) {
      e.preventDefault();

      var nombres = document.getElementById('nombres').value;
      var apellidos = document.getElementById('apellidos').value;
      var cedula = document.getElementById('cedula').value;
      var correo = document.getElementById('correo').value;
      var telefono = document.getElementById('telefono').value;
      var direccion = document.getElementById('direccion').value;

      fetch('http://192.168.100.2:3001/api/usuarios/' + usuarioId, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          nombres: nombres,
          apellidos: apellidos,
          cedula: cedula,
          correo: correo,
          telefono: telefono,
          direccion: direccion,
          rol: 'cliente'
        })
      })
        .then(function (res) {
          if (!res.ok) {
            throw new Error('Error al actualizar');
          }
          return res.json();
        })
        .then(function () {
          var mensaje = document.getElementById('mensaje');
          mensaje.classList.remove('d-none', 'alert-danger');
          mensaje.classList.add('alert', 'alert-success');
          mensaje.textContent = 'Usuario actualizado correctamente';
        })
        .catch(function () {
          var mensaje = document.getElementById('mensaje');
          mensaje.classList.remove('d-none', 'alert-success');
          mensaje.classList.add('alert', 'alert-danger');
          mensaje.textContent = 'Error al actualizar el usuario';
        });
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
