<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Insertar Usuario</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #eef4ff 0%, #f8fbff 50%, #ffffff 100%);
      min-height: 100vh;
    }

    .navbar {
      background: linear-gradient(90deg, #0d6efd, #3d8bfd);
      box-shadow: 0 10px 25px rgba(13, 110, 253, 0.18);
    }

    .navbar-brand {
      font-weight: 800;
    }

    .main-card {
      border: none;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 20px 45px rgba(31, 45, 61, 0.12);
      background: #fff;
    }

    .card-header-custom {
      background: linear-gradient(135deg, #198754, #38b36e);
      color: white;
      padding: 2rem;
      text-align: center;
    }

    .card-header-custom h2 {
      margin: 0;
      font-weight: 800;
    }

    .card-header-custom p {
      margin-top: 0.6rem;
      margin-bottom: 0;
      opacity: 0.95;
    }

    .card-body-custom {
      padding: 2rem;
    }

    .form-label {
      font-weight: 600;
      color: #344054;
    }

    .form-control {
      border-radius: 14px;
      padding: 0.9rem 1rem;
      border: 1px solid #dbe3ef;
    }

    .form-control:focus {
      box-shadow: 0 0 0 0.2rem rgba(13, 110, 253, 0.15);
      border-color: #86b7fe;
    }

    .btn-custom {
      border-radius: 14px;
      padding: 0.85rem 1.2rem;
      font-weight: 600;
    }

    .helper-text {
      color: #667085;
      font-size: 0.95rem;
      margin-bottom: 1.8rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
      <a class="navbar-brand" href="index_usuario.html">👥 Gestión de Usuarios</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse mt-2 mt-lg-0" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="ver_usuarios.html">Ver usuarios</a></li>
          <li class="nav-item"><a class="nav-link active" href="insertar_usuario.html">Insertar</a></li>
          <li class="nav-item"><a class="nav-link" href="consultar_usuario.html">Consultar</a></li>
          <li class="nav-item"><a class="nav-link" href="editar_usuario.html">Editar</a></li>
          <li class="nav-item"><a class="nav-link" href="borrar_usuario.html">Eliminar</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container py-5">
    <div class="main-card mx-auto" style="max-width: 850px;">
      <div class="card-header-custom">
        <h2>Insertar Nuevo Usuario</h2>
        <p>Completa el formulario para registrar un usuario en el sistema.</p>
      </div>

      <div class="card-body-custom">
        <p class="helper-text">
          Ingresa los datos principales del usuario. Todos los campos son importantes para el registro.
        </p>

        <form id="usuario-form">
          <div class="row g-4">
            <div class="col-md-6">
              <label for="nombres" class="form-label">Nombres</label>
              <input type="text" class="form-control" id="nombres" placeholder="Ej: Juan Pablo" required />
            </div>

            <div class="col-md-6">
              <label for="apellidos" class="form-label">Apellidos</label>
              <input type="text" class="form-control" id="apellidos" placeholder="Ej: Castillo Gómez" required />
            </div>

            <div class="col-md-6">
              <label for="cedula" class="form-label">Cédula</label>
              <input type="text" class="form-control" id="cedula" placeholder="Ej: 1234567890" required />
            </div>

            <div class="col-md-6">
              <label for="correo" class="form-label">Correo electrónico</label>
              <input type="email" class="form-control" id="correo" placeholder="Ej: usuario@gmail.com" required />
            </div>

            <div class="col-md-6">
              <label for="telefono" class="form-label">Teléfono</label>
              <input type="text" class="form-control" id="telefono" placeholder="Ej: 3001234567" required />
            </div>

            <div class="col-md-12">
              <label for="password" class="form-label">Contraseña Temporal</label>
              <input type="password" class="form-control" id="password" placeholder="Ej: temporal123" required />
            </div>

            <div class="col-md-6">
              <label for="direccion" class="form-label">Dirección</label>
              <input type="text" class="form-control" id="direccion" placeholder="Ej: Cali, Valle del Cauca" required />
            </div>
          </div>

          <div class="d-flex flex-wrap gap-3 mt-4">
            <button type="submit" class="btn btn-success btn-custom">Guardar usuario</button>
            <a href="index_usuario.html" class="btn btn-secondary btn-custom">Volver al inicio</a>
          </div>
        </form>

        <div id="mensaje" class="alert mt-4 d-none"></div>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('usuario-form').addEventListener('submit', function (e) {
      e.preventDefault();

      const nombres = document.getElementById('nombres').value;
      const apellidos = document.getElementById('apellidos').value;
      const cedula = document.getElementById('cedula').value;
      const correo = document.getElementById('correo').value;
      const telefono = document.getElementById('telefono').value;
      const direccion = document.getElementById('direccion').value;
      const password = document.getElementById('password').value;

      fetch('http://192.168.100.2:3001/api/usuarios/registrar', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ nombres, apellidos, cedula, correo, telefono, direccion, password })
      })
      .then(response => response.json())
      .then(data => {
        const mensaje = document.getElementById('mensaje');
        mensaje.classList.remove('d-none', 'alert-danger');
        mensaje.classList.add('alert', 'alert-success');
        mensaje.textContent = data.mensaje || 'Usuario insertado con éxito';

        document.getElementById('usuario-form').reset();
      })
      .catch(error => {
        const mensaje = document.getElementById('mensaje');
        mensaje.classList.remove('d-none', 'alert-success');
        mensaje.classList.add('alert', 'alert-danger');
        mensaje.textContent = 'Error al insertar el usuario';
      });
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
