<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pequeñas Huellas - Registro</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #a29bfe; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); width: 400px; text-align: center; margin: 20px; }
        input, select { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #6c5ce7; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        #msg { margin-top: 10px; font-size: 14px; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <div class="card">
        <h1>📝 Registro</h1>
        <input type="text" id="nombres" placeholder="Nombres">
        <input type="text" id="apellidos" placeholder="Apellidos">
        <input type="text" id="cedula" placeholder="Cédula">
        <input type="email" id="correo" placeholder="Correo electrónico">
        <input type="password" id="pass" placeholder="Contraseña">
        <input type="text" id="telefono" placeholder="Teléfono">
        <input type="text" id="direccion" placeholder="Dirección">
        
        <input type="hidden" id="rol" value="cliente">

        <button onclick="registrar()">Crear Cuenta</button>
        <div id="msg"></div>
        <p style="margin-top: 15px; font-size: 14px;">
            ¿Ya tienes cuenta? <a href="index.html" style="color: #6c5ce7; text-decoration: none; font-weight: bold;">Inicia sesión</a>
        </p>
    </div>

    <script>
        async function registrar() {
            const msgDiv = document.getElementById('msg');
            const datos = {
                nombres: document.getElementById('nombres').value,
                apellidos: document.getElementById('apellidos').value,
                cedula: document.getElementById('cedula').value,
                correo: document.getElementById('correo').value,
                password: document.getElementById('pass').value,
                telefono: document.getElementById('telefono').value,
                direccion: document.getElementById('direccion').value,
                rol: document.getElementById('rol').value
            };

            // Validación simple de campos vacíos
            if (Object.values(datos).some(x => x === "")) {
                msgDiv.className = "error";
                msgDiv.innerText = "Por favor, completa todos los campos.";
                return;
            }

            try {
                // USA LA MISMA IP QUE TE FUNCIONÓ EN EL LOGIN
                const res = await fetch('http://192.168.100.2:3001/api/usuarios/registrar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(datos)
                });

                const data = await res.json();

                if (res.ok) {
                    msgDiv.className = "success";
                    msgDiv.innerText = "¡Registro exitoso! Redirigiendo al login...";
                    setTimeout(() => window.location.href = 'index.html', 2000);
                } else {
                    msgDiv.className = "error";
                    msgDiv.innerText = data.error || "Error al registrar.";
                }
            } catch (e) {
                msgDiv.className = "error";
                msgDiv.innerText = "Error de conexión con el servidor.";
            }
        }
    </script>
</body>
</html>
