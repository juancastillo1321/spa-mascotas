<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mis Compras - Pequeñas Huellas</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body{
      font-family:'Inter',sans-serif;
      background: linear-gradient(135deg, #eef4ff 0%, #f8fbff 45%, #ffffff 100%);
      min-height:100vh;
    }
    .navbar{background: linear-gradient(90deg, #1a2a6c, #2a3a8c);}
    .card{
      border:none;
      border-radius:20px;
      box-shadow:0 18px 45px rgba(31,45,61,.12);
    }
    .badge-pill{
      border-radius:999px;
      padding:.35rem .7rem;
      font-weight:700;
      letter-spacing:.2px;
      text-transform:uppercase;
      font-size:.75rem;
    }
    .btn-custom{border-radius:12px;font-weight:600;}
    .table thead th{white-space:nowrap;}
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container">
    <a class="navbar-brand fw-bold" href="#">🛍️ Mis Reservas</a>
    <div class="ms-auto">
      <a class="btn btn-sm btn-outline-light" href="ver_productos.html">Servicios</a>
      <button class="btn btn-sm btn-danger btn-custom ms-2" id="btnCerrarSesion">Cerrar Sesión</button>
    </div>
  </div>
</nav>

<div class="container py-5">
  <div class="card p-4">
    <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
      <div>
        <h2 class="mb-0">Mi historial</h2>
        <p id="userStatus" class="text-muted mb-0 small"></p>
      </div>
      <button id="btnRefrescar" class="btn btn-outline-secondary btn-custom">Actualizar</button>
    </div>

    <div id="alert" class="alert d-none" role="alert"></div>

    <div class="table-responsive">
      <table class="table table-hover align-middle">
        <thead>
          <tr>
            <th>Servicio</th>
            <th>Fecha</th>
            <th>Total</th>
            <th>Estado</th>
            <th style="width: 150px;">Acciones</th>
          </tr>
        </thead>
        <tbody id="tbody">
            <tr><td colspan="5" class="text-center py-4">Cargando tus compras...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
  const userEmail = localStorage.getItem('correo');
  const API_RESERVAS = 'http://192.168.100.2:3003/api';

  // LÓGICA CERRAR SESIÓN
  document.getElementById('btnCerrarSesion').addEventListener('click', () => {
    if(confirm("¿Estás seguro de que deseas cerrar sesión?")){
        localStorage.clear(); // Limpia correo y cualquier otro dato
        window.location.href = 'index.html';
    }
  });

  function showAlert(type, msg){
    const a = document.getElementById('alert');
    a.className = `alert alert-${type}`;
    a.textContent = msg;
    a.classList.remove('d-none');
    setTimeout(() => a.classList.add('d-none'), 3500);
  }

  function badge(estado){
    const e = String(estado || '').toLowerCase();
    if (e === 'pagado') return `<span class="badge-pill bg-success text-white">PAGADO</span>`;
    if (e === 'pendiente') return `<span class="badge-pill bg-warning text-dark">PENDIENTE</span>`;
    return `<span class="badge-pill bg-secondary text-white">${estado || 'SIN ESTADO'}</span>`;
  }

  async function cargar(){
    const tb = document.getElementById('tbody');
    const userStatus = document.getElementById('userStatus');

    if (!userEmail) {
        window.location.href = 'index.html';
        return;
    }

    userStatus.innerHTML = `Usuario: <strong>${userEmail}</strong>`;

    try{
      const r = await fetch(`${API_RESERVAS}/ordenes`);
      const data = await r.json();

      if (!r.ok) throw new Error(data.error || `HTTP ${r.status}`);

      tb.innerHTML = '';

      const misReservas = data.filter(row => row.emailCliente === userEmail);

      if (misReservas.length === 0){
        tb.innerHTML = `<tr><td colspan="5" class="text-center text-muted py-4">No tienes reservas registradas.</td></tr>`;
        return;
      }

      misReservas.forEach(row => {
        const estado = String(row.estado || '').toLowerCase();
        
        // REGLA: Si está PAGADO, no se muestra el botón de cancelar
        const accionHtml = estado === 'pagado' 
            ? `<span class="text-muted small italic">No editable</span>` 
            : `<button class="btn btn-sm btn-outline-danger btn-custom btnEliminar" data-id="${row.id}">Cancelar</button>`;

        tb.insertAdjacentHTML('beforeend', `
          <tr>
            <td><strong>${row.nombreServicio}</strong></td>
            <td>${row.fecha}</td>
            <td>$${row.precioTotal}</td>
            <td>${badge(row.estado)}</td>
            <td>${accionHtml}</td>
          </tr>
        `);
      });

      document.querySelectorAll('.btnEliminar').forEach(btn => {
        btn.addEventListener('click', async () => {
          const id = btn.getAttribute('data-id');
          if (!confirm(`¿Deseas cancelar la reserva #${id}?`)) return;

          try{
            const r3 = await fetch(`${API_RESERVAS}/ordenes/${id}`, { method: 'DELETE' });
            if (!r3.ok) throw new Error('Error al eliminar');
            showAlert('success', `Reserva cancelada correctamente.`);
            cargar();
          }catch(err){
            showAlert('danger', 'No se pudo cancelar la reserva.');
          }
        });
      });

    }catch(err){
      showAlert('danger', 'Error de conexión con el servidor.');
      tb.innerHTML = `<tr><td colspan="5" class="text-center text-danger py-4">Error al cargar datos.</td></tr>`;
    }
  }

  document.getElementById('btnRefrescar').addEventListener('click', cargar);
  cargar();
</script>

</body>
</html>
