<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ver Reservas - Pequeñas Huellas</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body{
      font-family:'Inter',sans-serif;
      background: linear-gradient(135deg, #eef4ff 0%, #f8fbff 45%, #ffffff 100%);
      min-height:100vh;
    }
    .navbar{background: linear-gradient(90deg, #1a2a6c, #2a3a8c);}
    .card{
      border:none;
      border-radius:20px;
      box-shadow:0 18px 45px rgba(31,45,61,.12);
    }
    .badge-pill{
      border-radius:999px;
      padding:.35rem .7rem;
      font-weight:700;
      letter-spacing:.2px;
      text-transform:uppercase;
      font-size:.75rem;
    }
    .btn-custom{border-radius:12px;font-weight:600;}
    .table thead th{white-space:nowrap;}
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container">
    <a class="navbar-brand fw-bold" href="index_reservas.html">🧾 Reservas</a>
    <div class="ms-auto">
      <a class="btn btn-sm btn-outline-light" href="crear_reserva.html">Crear</a>
      <a class="btn btn-sm btn-outline-light" href="ver_productos.html">Servicios</a>
    </div>
  </div>
</nav>

<div class="container py-5">
  <div class="card p-4">
    <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
      <div>
        <h2 class="mb-0">Listado de reservas</h2>
        
      </div>
      <button id="btnRefrescar" class="btn btn-outline-secondary btn-custom">Refrescar</button>
    </div>

    <div id="alert" class="alert d-none" role="alert"></div>

    <div class="table-responsive">
      <table class="table table-hover align-middle">
        <thead>
          <tr>
            <th>ID</th>
            <th>Cliente</th>
            <th>Email</th>
            <th>Servicio</th>
            <th>Fecha</th>
            <th>Total</th>
            <th>Estado</th>
            <th style="width: 260px;">Acciones</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
  const API_RESERVAS = 'http://192.168.100.2:3003/api';

  function showAlert(type, msg){
    const a = document.getElementById('alert');
    a.className = `alert alert-${type}`;
    a.textContent = msg;
    a.classList.remove('d-none');
    setTimeout(() => a.classList.add('d-none'), 3500);
  }

  function badge(estado){
    const e = String(estado || '').toLowerCase();
    if (e === 'pagado') return `<span class="badge-pill bg-success text-white">PAGADO</span>`;
    if (e === 'pendiente') return `<span class="badge-pill bg-warning text-dark">PENDIENTE</span>`;
    if (e === 'cancelado') return `<span class="badge-pill bg-danger text-white">CANCELADO</span>`;
    return `<span class="badge-pill bg-secondary text-white">${(estado || 'SIN')}</span>`;
  }

  async function cargar(){
    try{
      const r = await fetch(`${API_RESERVAS}/ordenes`);
      const data = await r.json();

      if (!r.ok) throw new Error(data.error || `HTTP ${r.status}`);

      const tb = document.getElementById('tbody');
      tb.innerHTML = '';

      if (!Array.isArray(data) || data.length === 0){
        tb.innerHTML = `<tr><td colspan="8" class="text-center text-muted py-4">No hay reservas registradas.</td></tr>`;
        return;
      }

      data.forEach(row => {
        const estado = String(row.estado || '').toLowerCase();

        const btnPagarDisabled = estado !== 'pendiente' ? 'disabled' : '';
        const btnText = estado !== 'pendiente' ? 'Pagado' : 'Simular pago';

        tb.insertAdjacentHTML('beforeend', `
          <tr>
            <td>${row.id}</td>
            <td>${row.nombreCliente}</td>
            <td>${row.emailCliente}</td>
            <td>${row.nombreServicio}</td>
            <td>${row.fecha}</td>
            <td>$${row.precioTotal}</td>
            <td>${badge(row.estado)}</td>
            <td class="d-flex gap-2">
              <button class="btn btn-sm btn-primary btn-custom btnPagar"
                      data-id="${row.id}" ${btnPagarDisabled}>
                ${btnText}
              </button>

              <button class="btn btn-sm btn-danger btn-custom btnEliminar"
                      data-id="${row.id}">
                Eliminar
              </button>
            </td>
          </tr>
        `);
      });

      document.querySelectorAll('.btnPagar').forEach(btn => {
        btn.addEventListener('click', async () => {
          const id = btn.getAttribute('data-id');
          if (!id) return;

          if (!confirm(`¿Simular pago para la reserva #${id}?`)) return;

          try{
            const r2 = await fetch(`${API_RESERVAS}/ordenes/${id}/pagar`, {
              method: 'PUT',
              headers: { 'Content-Type': 'application/json' }
            });

            const resp = await r2.json().catch(() => ({}));
            if (!r2.ok) throw new Error(resp.error || `HTTP ${r2.status}`);

            showAlert('success', `Reserva #${id} marcada como pagado.`);
            await cargar();
          }catch(err){
            console.error(err);
            showAlert('danger', err.message || 'No se pudo simular el pago.');
          }
        });
      });

      document.querySelectorAll('.btnEliminar').forEach(btn => {
        btn.addEventListener('click', async () => {
          const id = btn.getAttribute('data-id');
          if (!id) return;

          if (!confirm(`¿Seguro que deseas eliminar la reserva #${id}?`)) return;

          try{
            const r3 = await fetch(`${API_RESERVAS}/ordenes/${id}`, {
              method: 'DELETE',
              headers: { 'Content-Type': 'application/json' }
            });

            const resp = await r3.json().catch(() => ({}));
            if (!r3.ok) throw new Error(resp.error || `HTTP ${r3.status}`);

            showAlert('success', `Reserva #${id} eliminada correctamente.`);
            await cargar();
          }catch(err){
            console.error(err);
            showAlert('danger', err.message || 'No se pudo eliminar la reserva.');
          }
        });
      });

    }catch(err){
      console.error(err);
      showAlert('danger', err.message || 'No se pudo cargar el listado.');
      document.getElementById('tbody').innerHTML =
        `<tr><td colspan="8" class="text-center text-danger py-4">Error cargando reservas.</td></tr>`;
    }
  }

  document.getElementById('btnRefrescar').addEventListener('click', cargar);
  cargar();
</script>

</body>
</html>
