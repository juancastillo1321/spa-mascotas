<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pequeñas Huellas - Finalizar Reserva</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; }
        .card-reserva { border-radius: 20px; border: none; overflow: hidden; }
        .header-blue { background: #1a2a6c; color: white; padding: 20px; text-align: center; }
        .data-display { background: #f8f9fa; border: 1px solid #dee2e6; padding: 12px; border-radius: 10px; font-weight: 600; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card card-reserva shadow-lg">
                <div class="header-blue">
                    <h4 class="m-0">Confirmación de Cita</h4>
                </div>
                <div class="card-body p-4">
                    <div id="reserva-alert" class="alert d-none text-center small"></div>

                    <form id="formFinal">
                        <label class="small text-muted fw-bold">SERVICIO</label>
                        <div id="viewNombre" class="data-display text-primary mb-3 text-uppercase">Cargando...</div>

                        <div class="row">
                            <div class="col-6 mb-3">
                                <label class="small text-muted fw-bold">COSTO</label>
                                <div id="viewPrecio" class="data-display text-success">$ 0.00</div>
                            </div>
                            <div class="col-6 mb-3">
                                <label class="small text-muted fw-bold">FECHA</label>
                                <input type="date" id="inputFecha" class="form-control" required>
                            </div>
                        </div>

                        <hr>
                        <p class="small text-center text-muted">La reserva se asociará a: <br><span id="viewUser" class="fw-bold"></span></p>

                        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold mt-2">Agendar Ahora</button>
                        <a href="ver_productos.html" class="btn btn-link w-100 text-muted text-decoration-none mt-2">Cancelar</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // 1. RECUPERAR DATOS DE SESIÓN Y URL
    const params = new URLSearchParams(window.location.search);
    
    // Obtenemos los datos del LocalStorage
    const userId = localStorage.getItem('id_usuario');
    const userEmail = localStorage.getItem('correo');
    const userRole = localStorage.getItem('rol');

    // 2. SEGURIDAD Y DEPURACIÓN
    console.log("DEBUG - Datos de sesión:", { userId, userEmail, userRole });

    if (!userId || userId === "null" || userId === "undefined") {
        console.error("❌ Error: No hay un ID de usuario válido en el LocalStorage.");
        alert("Tu sesión ha expirado o no has iniciado sesión. Volviendo al login.");
        window.location.href = 'index.html';
    }

    // 3. MOSTRAR DATOS EN PANTALLA
    const nombreServicio = params.get('nombre') || 'Servicio';
    const precioServicio = params.get('precio') || '0';
    const idServicio = params.get('id');

    document.getElementById('viewNombre').textContent = nombreServicio;
    document.getElementById('viewPrecio').textContent = `$ ${precioServicio}`;
    document.getElementById('viewUser').textContent = userEmail || "Usuario no identificado";

    // Configurar fecha mínima (mañana)
    const dt = new Date(); 
    dt.setDate(dt.getDate() + 1);
    document.getElementById('inputFecha').value = dt.toISOString().split('T')[0];

    // 4. ENVÍO DE LA ORDEN
    document.getElementById('formFinal').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const alertBox = document.getElementById('reserva-alert');
        alertBox.className = "alert d-none"; // Resetear alertas

        // Construcción del objeto que espera el backend
        const payload = {
            usuario: Number(userId),
            items: [{ 
                id: Number(idServicio), 
                cantidad: 1 
            }],
            fecha_reserva: document.getElementById('inputFecha').value
        };

        console.log("📤 Enviando reserva al servidor 3003:", payload);

        try {
            // NOTA: Asegúrate de que la IP 192.168.100.2 sea la correcta de tu Vagrant
            const res = await fetch('http://192.168.100.2:3003/api/ordenes', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            });

            const result = await res.json();

            if (res.ok) {
                console.log("✅ Reserva exitosa:", result);
                alert("¡Cita agendada con éxito!");
                // Redirigir según el rol
                window.location.href = (userRole === 'admin') ? 'ver_reservas.html' : 'ver_productos.html';
            } else {
                // Si el backend responde con error (ej. cupos agotados o usuario no existe)
                throw new Error(result.error || result.detalle || "Error desconocido en el servidor");
            }
        } catch (err) {
            console.error("❌ Fallo en la petición fetch:", err);
            alertBox.className = "alert alert-danger d-block";
            alertBox.textContent = "Error al conectar: " + err.message;
        }
    });
</script>
</body>
</html>
