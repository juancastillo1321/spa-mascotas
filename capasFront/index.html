<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pequeñas Huellas - Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(120deg, #2980b9, #8e44ad); height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', sans-serif; }
        .login-box { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 15px 25px rgba(0,0,0,0.2); width: 100%; max-width: 400px; }
        .btn-custom { background: #1a2a6c; color: white; border: none; transition: 0.3s; }
        .btn-custom:hover { background: #b21f1f; color: white; }
    </style>
</head>
<body>

<div class="login-box text-center">
    <h2 class="mb-4 fw-bold" style="color: #1a2a6c;">🐾 Pequeñas Huellas</h2>
    <p class="text-muted mb-4">Ingresa tus credenciales para continuar</p>
    
    <div id="error-msg" class="alert alert-danger d-none small"></div>

    <form id="loginForm">
        <div class="mb-3">
            <input type="email" id="email" class="form-control" placeholder="Correo electrónico" required>
        </div>
        <div class="mb-4">
            <input type="password" id="password" class="form-control" placeholder="Contraseña" required>
        </div>
        <button type="submit" class="btn btn-custom w-100 py-2 fw-bold">Entrar al Sistema</button>
    </form>

    <div class="mt-4 small">
        ¿Eres nuevo? <a href="registro.html" class="text-decoration-none">Crea una cuenta aquí</a>
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const errorDiv = document.getElementById('error-msg');
        errorDiv.classList.add('d-none');

        const payload = {
            correo: document.getElementById('email').value,
            password: document.getElementById('password').value
        };

        try {
            const response = await fetch('http://192.168.100.2:3001/api/usuarios/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await response.json();

            if (response.ok) {
                // --- CREACIÓN DE LA SESIÓN ---
                // Es vital que los nombres coincidan exactamente con lo que usaremos después
                localStorage.setItem('id_usuario', data.id); 
                localStorage.setItem('rol', data.rol);
                localStorage.setItem('correo', data.correo);
                localStorage.setItem('nombre_completo', `${data.nombre} ${data.apellido || ''}`);

                // Redirigir según el destino que envía el backend (admin o cliente)
                window.location.href = data.redireccionarA; 
            } else {
                errorDiv.textContent = data.error || "Credenciales inválidas";
                errorDiv.classList.remove('d-none');
            }
        } catch (err) {
            errorDiv.textContent = "Error: El microservicio de usuarios (3001) no responde.";
            errorDiv.classList.remove('d-none');
        }
    });
</script>
</body>
</html>
