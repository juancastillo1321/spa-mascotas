  #  container_name: streaming-job

  #  extra_hosts:
  #  - "host.docker.internal:host-gateway"

  #  depends_on:
  #    - spark-master
  #    - namenode
  #    - simulador
  #    - socket-server

  #  command: >
  #    spark-submit
  #    --master spark://spark-master:7077
  #    --total-executor-cores 2
  #    --executor-cores 1
  #    /app/stream_mascotas.py

  #  networks:
  #    - mascotas-network

  batch-job:
    image: apache/spark:3.5.1
    container_name: batch-job
    profiles:
      - manual
    user: root
    volumes:
      - ./batch:/opt/proyecto/batch
      - ./dashboard:/opt/proyecto/dashboard
      - ./dataset_reservas.csv:/opt/proyecto/dataset_reservas.csv
      - ./dataset_servicios.csv:/opt/proyecto/dataset_servicios.csv
      - ./dataset_usuarios.csv:/opt/proyecto/dataset_usuarios.csv
      # 💡 EL PUENTE: Mapeamos la ruta física compartida a la ruta interna que usa tu script de Spark
      - /vagrant/resultados_dashboard:/vagrant/resultados_dashboard
    command: >
      /opt/spark/bin/spark-submit
      --master spark://spark-master:7077
      /opt/proyecto/batch/analisis_mascotas.py
    depends_on:
      - spark-master
    networks:
      - mascotas-network

  haproxy:
    build:
      context: ./haproxy
    container_name: haproxy
    ports:
      - "80:80"
      - "8404:8404"
    depends_on:
      - dashboard
    networks:
      - mascotas-network

 #socket-server:

  #  build:
