services:

  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    environment:
      - CLUSTER_NAME=mascotas-cluster
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
    ports:
      - "9870:9870"
      - "9000:9000"
    volumes:
      - namenode_data:/hadoop/dfs/name
    networks:
      - mascotas-network

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - SERVICE_PRECONDITION=namenode:9870
    depends_on:
      - namenode
    ports:
      - "9864:9864"
    volumes:
      - datanode_data:/hadoop/dfs/data
    networks:
      - mascotas-network

  spark-master:
    image: apache/spark:3.5.1
    container_name: spark-master
    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.master.Master
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - ./batch:/opt/proyecto/batch
      - ./streaming:/opt/proyecto/streaming
      - ./dashboard:/opt/proyecto/dashboard
      - ./dataset_reservas.csv:/opt/proyecto/dataset_reservas.csv
      - ./dataset_servicios.csv:/opt/proyecto/dataset_servicios.csv
      - ./dataset_usuarios.csv:/opt/proyecto/dataset_usuarios.csv
    networks:
      - mascotas-network

  spark-worker-1:
    image: apache/spark:3.5.1
    container_name: spark-worker-1
    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077
    depends_on:
      - spark-master
    volumes:
      - ./batch:/opt/proyecto/batch
      - ./streaming:/opt/proyecto/streaming
      - ./dataset_reservas.csv:/opt/proyecto/dataset_reservas.csv
      - ./dataset_servicios.csv:/opt/proyecto/dataset_servicios.csv
      - ./dataset_usuarios.csv:/opt/proyecto/dataset_usuarios.csv
      - ./streaming:/app
    networks:
      - mascotas-network

  spark-worker-2:
    image: apache/spark:3.5.1
    container_name: spark-worker-2
    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077
    depends_on:
      - spark-master
    volumes:
      - ./batch:/opt/proyecto/batch
      - ./streaming:/opt/proyecto/streaming
      - ./dataset_reservas.csv:/opt/proyecto/dataset_reservas.csv
      - ./dataset_servicios.csv:/opt/proyecto/dataset_servicios.csv
      - ./dataset_usuarios.csv:/opt/proyecto/dataset_usuarios.csv
      - ./streaming:/app
    networks:
      - mascotas-network

  dashboard:
    build:
      context: ./dashboard
    container_name: dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./dashboard:/app
      # 💡 EL TRUCO: Mapeamos la carpeta real de resultados dentro de la ruta que busca Streamlit
      - /vagrant/resultados_dashboard:/app/resultados_dashboard
      - ./streaming/resultados_streaming:/app/resultados_streaming
    depends_on:
      - spark-master
    networks:
      - mascotas-network

  #simulador:
  #  build:
  #    context: ./streaming
  #    dockerfile: Dockerfile.simulador
  #  container_name: simulador
  #  volumes:
  #    - ./streaming:/app
  #  depends_on:
  #    - namenode
  #    - socket-server
  #  networks:
  #    - mascotas-network

  #streaming-job:
