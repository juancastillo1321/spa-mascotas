  #    dockerfile: Dockerfile.socket

  #  container_name: socket-server

  #  ports:
  #    - "9999:9999"


  #  networks:
  #    - mascotas-network

  ml-job:

    image: apache/spark:3.5.1
    container_name: ml-job

    build:
      context: ./mlib
      dockerfile: Dockerfile.m

    profiles:
      - manual

    volumes:
      - ./mlib:/opt/proyecto/mlib
      - ./dataset_reservas.csv:/dataset_reservas.csv
      - ./dataset_servicios.csv:/dataset_servicios.csv
      - ./dataset_usuarios.csv:/dataset_usuarios.csv

    command: >
      /opt/spark/bin/spark-submit
      --master spark://spark-master:7077
      /opt/proyecto/mlib/mllib_predict.py

    depends_on:
      - spark-master
      - namenode

    networks:
      - mascotas-network

volumes:
  namenode_data:
  datanode_data:

networks:
  mascotas-network:
    driver: bridge